name: milestone5-ci-cd

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  test-m5:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Milestone_5-ML_Productionization
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/Milestone_4-Model_Dev/src
        run: pytest tests -q

      - name: Run smoke test
        env:
          PYTHONPATH: ${{ github.workspace }}/Milestone_4-Model_Dev/src
        run: python scripts/smoke_test.py

      - name: Run serving pipeline proof
        env:
          PYTHONPATH: ${{ github.workspace }}/Milestone_4-Model_Dev/src
        run: python scripts/run_serving_pipeline.py

  build-images:
    runs-on: ubuntu-latest
    needs: test-m5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Milestone_5-ML_Productionization/deployment/Dockerfile.api -t csc5382-m5-api .

      - name: Build client image
        run: docker build -f Milestone_5-ML_Productionization/deployment/Dockerfile.client -t csc5382-m5-client .

  build-huggingface-space:
    runs-on: ubuntu-latest
    needs: test-m5
    defaults:
      run:
        working-directory: Milestone_5-ML_Productionization
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Build Hugging Face Space bundle
        env:
          PYTHONPATH: ${{ github.workspace }}/Milestone_4-Model_Dev/src
        run: python scripts/deploy_huggingface_space.py

  deploy-huggingface-space:
    runs-on: ubuntu-latest
    needs: [build-images, build-huggingface-space]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
    defaults:
      run:
        working-directory: Milestone_5-ML_Productionization
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Deploy Hugging Face Space
        if: env.HF_TOKEN != '' && env.HF_SPACE_ID != ''
        env:
          PYTHONPATH: ${{ github.workspace }}/Milestone_4-Model_Dev/src
          M5_DEPLOY_HF: "1"
        run: python scripts/deploy_huggingface_space.py

      - name: Skip Hugging Face deployment
        if: env.HF_TOKEN == '' || env.HF_SPACE_ID == ''
        run: echo "Skipping Hugging Face deployment because HF_TOKEN or HF_SPACE_ID is not configured."

  deploy-compose-vm:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    env:
      M5_DEPLOY_HOST: ${{ secrets.M5_DEPLOY_HOST }}
      M5_DEPLOY_USER: ${{ secrets.M5_DEPLOY_USER }}
      M5_DEPLOY_SSH_KEY: ${{ secrets.M5_DEPLOY_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy repository to deployment host
        if: env.M5_DEPLOY_HOST != '' && env.M5_DEPLOY_USER != '' && env.M5_DEPLOY_SSH_KEY != ''
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.M5_DEPLOY_HOST }}
          username: ${{ secrets.M5_DEPLOY_USER }}
          key: ${{ secrets.M5_DEPLOY_SSH_KEY }}
          source: "."
          target: "~/csc5382-m5"

      - name: Deploy stack with Docker Compose
        if: env.M5_DEPLOY_HOST != '' && env.M5_DEPLOY_USER != '' && env.M5_DEPLOY_SSH_KEY != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.M5_DEPLOY_HOST }}
          username: ${{ secrets.M5_DEPLOY_USER }}
          key: ${{ secrets.M5_DEPLOY_SSH_KEY }}
          script: |
            cd ~/csc5382-m5/Milestone_5-ML_Productionization/deployment
            export SELF_HOSTED_OPENAI_BASE_URL='${{ secrets.SELF_HOSTED_OPENAI_BASE_URL }}'
            export SELF_HOSTED_OPENAI_API_KEY='${{ secrets.SELF_HOSTED_OPENAI_API_KEY }}'
            export SELF_HOSTED_MODEL_NAME='${{ secrets.SELF_HOSTED_MODEL_NAME }}'
            export M5_SELF_HOSTED_FINE_TUNED_MODEL_NAME='${{ secrets.M5_SELF_HOSTED_FINE_TUNED_MODEL_NAME }}'
            docker compose up -d --build

      - name: Skip VM deployment
        if: env.M5_DEPLOY_HOST == '' || env.M5_DEPLOY_USER == '' || env.M5_DEPLOY_SSH_KEY == ''
        run: echo "Skipping VM deployment because M5 deploy SSH secrets are not configured."
