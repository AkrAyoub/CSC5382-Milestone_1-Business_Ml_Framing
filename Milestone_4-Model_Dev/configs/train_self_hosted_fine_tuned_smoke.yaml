run_name: smoke_tiny_gpt2_sft
model:
  base_model_name: sshleifer/tiny-gpt2
  trust_remote_code: false
  torch_dtype: float32
  use_4bit: false
peft:
  r: 4
  lora_alpha: 8
  lora_dropout: 0.0
  bias: none
  target_modules:
    - c_attn
training:
  max_steps: 2
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-4
  logging_steps: 1
  save_steps: 2
  save_total_limit: 1
  eval_strategy: steps
  eval_steps: 2
  warmup_ratio: 0.0
  max_length: 256
  gradient_checkpointing: false
  bf16: false
  fp16: false
  report_to: []
tracking:
  enable_mlflow: true
  experiment_name: milestone4-self-hosted-sft-smoke
