run_name: self_hosted_qwen25_coder_7b_sft
model:
  base_model_name: Qwen/Qwen2.5-Coder-7B-Instruct
  trust_remote_code: false
  torch_dtype: float16
  use_4bit: false
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true
peft:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
training:
  num_train_epochs: 2
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  logging_steps: 5
  save_steps: 25
  eval_strategy: steps
  eval_steps: 25
  warmup_ratio: 0.03
  max_length: 2048
  gradient_checkpointing: true
  bf16: false
  fp16: false
  report_to: []
tracking:
  enable_mlflow: true
  experiment_name: milestone4-self-hosted-sft
