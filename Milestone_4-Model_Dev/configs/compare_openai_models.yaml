run_name: openai_symbolic_generator_model_comparison
random_seed: 42
runtime:
  allow_template_fallback: false
evaluation:
  splits:
    - train
    - val
    - test
  exact_match_tolerance_pct: 1.0e-6
tracking:
  enable_mlflow: true
  enable_codecarbon: true
  experiment_name: milestone4-openai-symbolic-comparison
comparison:
  candidate_names:
    - deterministic_baseline
    - openai_gpt41_mini_base
    - openai_gpt41_mini_finetuned
  openai_gpt41_mini_base:
    enabled: true
    model_name: gpt-4.1-mini-2025-04-14
    prompt_template: robust_v1
    max_tokens: 3500
  openai_gpt41_mini_finetuned:
    enabled: false
    model_name: ""
    prompt_template: robust_v1
    max_tokens: 3500
